services:
  backend:
    build: ./backend
    container_name: smarthouse_backend
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL}
      AIO_USERNAME: ${AIO_USERNAME}
      AIO_KEY: ${AIO_KEY}
      JWT_SECRET: ${JWT_SECRET}
      TZ: Asia/Bangkok
    ports:
      - "8001:8001"
    volumes:
      - ./backend:/app
      - ./root.crt:/root/.postgresql/root.crt:ro

volumes:
  postgres_data:

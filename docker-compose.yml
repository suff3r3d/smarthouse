version: '3.8'

services:
  backend:
    build: ./backend
    container_name: smarthouse_backend
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL}
      AIO_USERNAME: ${AIO_USERNAME}
      AIO_KEY: ${AIO_KEY}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

volumes:
  postgres_data:
